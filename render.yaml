services:
  - type: web
    name: fleet-accounting-api
    runtime: node
    buildCommand: cd backend && npm install && npx prisma generate
    startCommand: cd backend && npm run db:migrate:prod && npm run db:seed && node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: fleet-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: PORT
        value: 5000

databases:
  - name: fleet-db
    plan: free
    databaseName: fleet_accounting
